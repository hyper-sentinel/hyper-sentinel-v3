# Hyper-Sentinel v2 — NATS Server Configuration
# NASA/Cloudflare-grade message fabric for agent communication
# ===========================================================

# Server identity
server_name: "hyper-sentinel-nats"

# Client connections
listen: "0.0.0.0:4222"
max_connections: 1024
max_payload: 8MB

# JetStream — durable, persistent messaging
jetstream {
    # Memory store limit
    max_mem: 256MB

    # File store limit
    max_file: 1GB

    # Persistence directory
    store_dir: "/data/jetstream"
}

# HTTP monitoring endpoint
http_port: 8222

# Logging
debug: false
trace: false
logtime: true

# Authorization (dev mode — tighten for prod)
# In production, use nkeys or token auth:
# authorization {
#     token: "${NATS_AUTH_TOKEN}"
# }

# Cluster name for future multi-node expansion
# cluster {
#     name: "hyper-sentinel-cluster"
#     listen: "0.0.0.0:6222"
# }
