# Hyper-Sentinel v3 — Docker Compose Orchestration
# =================================================
# Architecture: NATS (nervous system) + Ollama (local LLM) + Agent containers
# Pattern: tobalo/gogent Docker Compose with sentinel_network bridge

services:
  # ─── NATS — Message Fabric (Nervous System) ───────────────────
  nats:
    image: nats:latest
    container_name: hyper-sentinel-nats
    command: [ "--config", "/etc/nats/nats-server.conf" ]
    volumes:
      - ./docker/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data/jetstream
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
    networks:
      sentinel_network:
        aliases:
          - nats
    healthcheck:
      test: [ "CMD", "nats-server", "--help" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─── Ollama — Local LLM Inference ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hyper-sentinel-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODEL=deepseek-r1:1.5b
    networks:
      sentinel_network:
        aliases:
          - ollama
    healthcheck:
      test: [ "CMD", "/bin/ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: serve
    restart: unless-stopped

  # ─── Ollama Model Init ───────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: hyper-sentinel-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - sentinel_network
    command: pull deepseek-r1:1.5b

  # ─── MarketAgent — Market Surveillance ───────────────────────
  market-agent:
    build:
      context: ./agents/market-agent
      dockerfile: Dockerfile
    container_name: hyper-sentinel-market-agent
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - LLM_PROVIDER=${LLM_PROVIDER:-CLAUDE}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OLLAMA_HOST=http://ollama:11434
      - AGENT_NAME=MarketAgent
      - DB_PATH=/app/data/agent_decisions.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - market_agent_data:/app/data
    networks:
      - sentinel_network
    restart: unless-stopped

networks:
  sentinel_network:
    name: hyper_sentinel_network
    driver: bridge

volumes:
  nats_data:
  ollama_data:
  market_agent_data:
